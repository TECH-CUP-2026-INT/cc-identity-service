# CI Pipeline — identity-service
# Runs on every push and pull request to develop, main and feature branches.
# Uses the test Spring profile with Flapdoodle embedded MongoDB.
# No external database is needed in CI.

name: CI — identity-service

on:
  push:
    branches:
      - develop
      - main
      - feat/vera
      - feat/ruiz

  pull_request:
    branches:
      - develop
      - main
      - feat/vera
      - feat/ruiz

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Grant execute permission to Maven Wrapper
        run: chmod +x mvnw

      - name: Compile
        run: ./mvnw compile --no-transfer-progress

      - name: Run tests
        env:
          GOOGLE_CLIENT_ID: test-client-id
          GOOGLE_CLIENT_SECRET: test-client-secret
          JWT_SECRET: test-secret-key-that-is-at-least-256-bits-long-for-testing
        run: ./mvnw test --no-transfer-progress -Dspring.profiles.active=test

      - name: Generate coverage report
        if: always()
        run: ./mvnw jacoco:report --no-transfer-progress

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-identity
          path: target/site/jacoco/
          retention-days: 7
          if-no-files-found: warn

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-identity
          path: target/surefire-reports/
          retention-days: 7
          if-no-files-found: warn

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t cc-identity-service:ci .

