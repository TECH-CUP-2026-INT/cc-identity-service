# ── CI Pipeline — identity-service ──────────────────────────────────────────
# Runs on every push and pull request to develop, main and feat/ruiz.
# Uses the 'test' Spring profile which activates application-test.yml
# (Flapdoodle embedded MongoDB — no external DB needed in CI).
name: CI — identity-service

on:
  push:
    branches: [ develop, main, feat/ruiz ]
  pull_request:
    branches: [ develop, main, feat/ruiz ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Compile
        run: mvn compile --no-transfer-progress

      - name: Run tests
        run: mvn test --no-transfer-progress -Dspring.profiles.active=test

      - name: Generate coverage report
        run: mvn jacoco:report --no-transfer-progress
        if: always()

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report-identity
          path: target/site/jacoco/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports-identity
          path: target/surefire-reports/
          retention-days: 7

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t cc-identity-service:ci .

