site_name: TechCup — Identity Service
site_description: Technical documentation for the identity microservice.
site_author: TECH-CUP 2026 INT
site_url: https://tech-cup-2026-int.github.io/cc-identity-service/
repo_name: TECH-CUP-2026-INT/cc-identity-service
repo_url: https://github.com/TECH-CUP-2026-INT/cc-identity-service
theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
extra_css:
  - assets/stylesheets/extra.css
plugins:
  - search
markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
nav:
  - Home: index.md
  - API: api.md
  - Configuration: configuracion.md
