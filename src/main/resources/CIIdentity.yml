# ── CI Pipeline — identity-service ──────────────────────────────────────────
# Runs on every push and pull request to develop and main.
# Uses the 'test' Spring profile which activates application-test.yml
# (H2 in-memory database — no PostgreSQL needed in CI).

name: CI — identity-service

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:

      # 1. Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Java 21 with Maven cache
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # 3. Compile the project
      - name: Compile
        run: mvn compile --no-transfer-progress

      # 4. Run tests with the 'test' profile (H2 in-memory DB)
      # The application-test.yml overrides datasource and mail config
      - name: Run tests
        run: mvn test --no-transfer-progress -Dspring.profiles.active=test

      # 5. Generate JaCoCo coverage report
      - name: Generate coverage report
        run: mvn jacoco:report --no-transfer-progress

      # 6. Upload coverage report as artifact (visible in GitHub Actions)
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report-identity
          path: target/site/jacoco/
          retention-days: 7

      # 7. Upload Surefire test results (shows pass/fail details in GitHub)
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports-identity
          path: target/surefire-reports/
          retention-days: 7