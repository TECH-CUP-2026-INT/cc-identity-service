spring:
  application:
    name: service-identity

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/identity_service}

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:placeholder-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:placeholder-google-client-secret}
            scope: openid, profile, email

server:
  port: ${SERVER_PORT:8081}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:defaultSecretKeyForDevelopmentOnlyChangeInProduction2026!}
  expiration-ms: ${JWT_EXPIRATION:3600000}

# Auth Configuration
auth:
  max-failed-login-attempts: ${AUTH_MAX_FAILED_LOGIN_ATTEMPTS:5}
  lockout-duration-minutes: ${AUTH_LOCKOUT_DURATION_MINUTES:15}
  inactivity-timeout-minutes: ${AUTH_INACTIVITY_TIMEOUT_MINUTES:30}

# OTP Configuration
otp:
  expiration-minutes: ${OTP_EXPIRATION_MINUTES:5}
  max-attempts: ${OTP_MAX_ATTEMPTS:3}
  resend-cooldown-seconds: ${OTP_RESEND_COOLDOWN:60}
  length: ${OTP_LENGTH:6}

# Recovery Code Configuration
recovery:
  expiration-minutes: ${RECOVERY_EXPIRATION_MINUTES:15}

# Logging
logging:
  level:
    root: INFO
    co.edu.escuelaing.techcup.identity: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Swagger
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
