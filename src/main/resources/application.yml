# ── identity-service — configuración unificada ───────────────────────────────
# Este archivo reemplaza application.yml + application-dev.yml + application-prod.yml
# Los perfiles se activan con -Dspring.profiles.active=dev|prod|test
# Por defecto arranca en 'dev' (ideal para desarrollo local).
#
# Perfiles disponibles:
#   dev  — PostgreSQL local + Mailtrap (correos falsos) + logs verbose
#   prod — Todo desde variables de entorno + logs mínimos
#   test — H2 en memoria + mail deshabilitado (para tests unitarios y CI)

spring:
  application:
    name: service-identity
  profiles:
    active: dev

server:
  # CONFIRMAR PUERTO CON LOS OTROS EQUIPOS DE MICROSERVICIOS
  port: 11711

app:
  jwt:
    secret: ${JWT_SECRET:super-secret-key-that-is-at-least-256-bits-long-for-hs256}
    expiration-ms: 900000          # 15 min
    refresh-expiration-ms: 604800000  # 7 días
  otp:
    expiration-minutes: 5
    length: 6

---
# ── PERFIL: dev ───────────────────────────────────────────────────────────────
# Uso: arrancar la app localmente con IntelliJ o mvn spring-boot:run
# Base de datos: PostgreSQL local
# Correo: Mailtrap (sandbox — los OTP no se envían de verdad)

spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/identity_db
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  mail:
    host: sandbox.smtp.mailtrap.io
    port: 2525
    username: ${MAIL_USER:tu_usuario_mailtrap}
    password: ${MAIL_PASS:tu_password_mailtrap}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

logging:
  level:
    co.edu.escuelaing.techcup: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

---
# ── PERFIL: prod ──────────────────────────────────────────────────────────────
# Uso: despliegue en servidor real
# Todo viene de variables de entorno — nada hardcodeado
# ddl-auto: validate — nunca modifica el esquema en producción

spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USER}
    password: ${MAIL_PASS}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

logging:
  level:
    root: WARN
    co.edu.escuelaing.techcup: INFO

---
# ── PERFIL: test ──────────────────────────────────────────────────────────────
# Uso: mvn test en local y pipeline CI/CD de GitHub Actions
# Base de datos: H2 en memoria — no requiere PostgreSQL instalado
# Mail: deshabilitado — OtpService debe estar mockeado en los tests
# server.port: 0 — puerto aleatorio para evitar conflictos entre tests

spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  mail:
    host: localhost
    port: 3025
    username: test
    password: test
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

server:
  port: 0

logging:
  level:
    root: WARN
    co.edu.escuelaing.techcup: INFO