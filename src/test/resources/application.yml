# Test configuration using embedded MongoDB.

spring:
  data:
    mongodb:
      database: identity_test

  mail:
    host: localhost
    port: 3025
    username: test
    password: test

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-client-id
            client-secret: test-client-secret
            scope:
              - email
              - profile

app:
  jwt:
    secret: test-secret-key-that-is-at-least-256-bits-long-for-testing
    expiration-ms: 900000
    refresh-expiration-ms: 604800000

  otp:
    expiration-minutes: 5
    length: 6

de:
  flapdoodle:
    mongodb:
      embedded:
        version: 7.0.14

logging:
  level:
    root: WARN